{% extends "base.html" %}
{% block title %}Eliminar lote{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
        <div class="h-12 w-12 rounded-xl bg-red-50 text-red-600 flex items-center justify-center mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
            </svg>
        </div>
        <h1 class="text-lg font-semibold text-slate-800">Eliminar lote</h1>
        <p class="text-sm text-slate-500 mt-1">
            Vas a eliminar el lote <strong>"{{ lote.curso }}"</strong> y todos sus archivos (Excel, plantilla y certificados generados).
            Esta accion no se puede deshacer.
        </p>
        <form method="post" class="mt-6 flex gap-3">
            {% csrf_token %}
            <a href="{% url 'detalle_lote' lote.pk %}" class="flex-1 text-center bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 font-medium text-sm rounded-lg py-2.5 transition">
                Cancelar
            </a>
            <button type="submit" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-medium text-sm rounded-lg py-2.5 transition">
                Eliminar definitivamente
            </button>
        </form>
    </div>
</div>
{% endblock %}
